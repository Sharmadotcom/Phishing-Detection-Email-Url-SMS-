<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PhishGuard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      width: 320px;
      background: #0a0f1e;
      color: #e2e8f0;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.12), rgba(6, 182, 212, 0.12));
      border-bottom: 1px solid rgba(59, 130, 246, 0.1);
      padding: 20px;
      text-align: center;
    }

    .header-shield {
      width: 40px;
      height: 40px;
      margin: 0 auto 10px;
      filter: drop-shadow(0 0 12px rgba(0, 245, 255, 0.4));
    }

    .header h1 {
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 4px;
    }

    /* Body */
    .body {
      padding: 20px;
    }

    .current-url {
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .url-display {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.8rem;
      color: #94a3b8;
      word-break: break-all;
      background: rgba(0, 0, 0, 0.3);
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 16px;
      max-height: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Scan Button */
    .scan-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      color: #030712;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
    }

    .scan-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 30px rgba(0, 245, 255, 0.35);
    }

    .scan-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .scan-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2.5px solid rgba(3, 7, 18, 0.2);
      border-top-color: #030712;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .scan-btn.loading .spinner { display: block; }
    .scan-btn.loading .btn-icon { display: none; }
    .scan-btn.loading .btn-label { display: none; }
    .scan-btn .loading-label { display: none; }
    .scan-btn.loading .loading-label { display: inline; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Result */
    .result {
      display: none;
      margin-top: 16px;
      padding: 16px;
      border-radius: 10px;
      border: 1px solid;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result.visible { display: block; }

    .result.safe {
      background: rgba(34, 197, 94, 0.08);
      border-color: rgba(34, 197, 94, 0.25);
    }

    .result.threat {
      background: rgba(239, 68, 68, 0.08);
      border-color: rgba(239, 68, 68, 0.25);
    }

    .result.error-state {
      background: rgba(245, 158, 11, 0.08);
      border-color: rgba(245, 158, 11, 0.25);
    }

    .result-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .result.safe .result-status { color: #22c55e; }
    .result.threat .result-status { color: #ef4444; }
    .result.error-state .result-status { color: #f59e0b; }

    .result-status svg {
      width: 20px;
      height: 20px;
    }

    .result-confidence {
      font-size: 0.8rem;
      color: #94a3b8;
    }

    .result-confidence strong {
      font-family: 'Consolas', monospace;
      font-weight: 700;
    }

    .result.safe .result-confidence strong { color: #22c55e; }
    .result.threat .result-confidence strong { color: #ef4444; }

    /* Footer */
    .footer {
      padding: 12px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      text-align: center;
    }

    .footer a {
      font-size: 0.72rem;
      color: #64748b;
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer a:hover {
      color: #00f5ff;
    }
  </style>
</head>
<body>

  <div class="header">
    <svg class="header-shield" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="1.5">
      <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3b82f6"/>
        <stop offset="100%" stop-color="#06b6d4"/>
      </linearGradient></defs>
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
    </svg>
    <h1>PhishGuard</h1>
    <p>Real-Time Threat Intelligence</p>
  </div>

  <div class="body">
    <div class="current-url">Current Page</div>
    <div class="url-display" id="current-url">Loading...</div>

    <button class="scan-btn" id="scan-btn">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
      <span class="spinner"></span>
      <span class="btn-label">Scan This Page</span>
      <span class="loading-label">Analyzing...</span>
    </button>

    <div class="result" id="result">
      <div class="result-status" id="result-status"></div>
      <div class="result-confidence" id="result-confidence"></div>
    </div>
  </div>

  <div class="footer">
    <a href="http://127.0.0.1:5000" target="_blank">Open PhishGuard Dashboard →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
